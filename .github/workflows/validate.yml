name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enable Corepack
        shell: pwsh
        run: corepack enable

      - name: Create Local Operator Config
        shell: pwsh
        run: Copy-Item config.example.yaml config.yaml

      - name: Install service/base Dependencies
        shell: pwsh
        working-directory: service/base
        run: npm ci

      - name: Install Cloudflare Worker Dependencies
        shell: pwsh
        working-directory: upstreams/cloudflare_temp_email/worker
        run: corepack pnpm install --frozen-lockfile

      - name: Install Cloudflare Frontend Dependencies
        shell: pwsh
        working-directory: upstreams/cloudflare_temp_email/frontend
        run: corepack pnpm install --frozen-lockfile

      - name: Run Repository Validation
        shell: pwsh
        run: ./scripts/test-all.ps1
