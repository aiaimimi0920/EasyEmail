name: Publish Service Base GHCR

on:
  push:
    tags:
      - "v*"
      - "release-*"
      - "service-base-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image version tag override"
        required: false
        type: string
      platform:
        description: "Docker build platform list"
        required: false
        default: "linux/amd64"
        type: string
      push_latest:
        description: "Also publish the latest tag"
        required: false
        default: true
        type: boolean
      run_smoke:
        description: "Run service/base smoke check before pushing"
        required: false
        default: true
        type: boolean
      force_publish:
        description: "Publish even when the current commit does not touch service/base or deployment files"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: easy-email-service

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Materialize Operator Config
        env:
          EASYEMAIL_CF_PUBLIC_BASE_URL: ${{ secrets.EASYEMAIL_CF_PUBLIC_BASE_URL }}
          EASYEMAIL_CF_PUBLIC_DOMAIN: ${{ secrets.EASYEMAIL_CF_PUBLIC_DOMAIN }}
          EASYEMAIL_CF_PUBLIC_ZONE: ${{ secrets.EASYEMAIL_CF_PUBLIC_ZONE }}
          EASYEMAIL_CF_WORKER_NAME: ${{ secrets.EASYEMAIL_CF_WORKER_NAME }}
          EASYEMAIL_CF_WORKER_ENV: ${{ secrets.EASYEMAIL_CF_WORKER_ENV }}
          EASYEMAIL_CF_PASSWORDS: ${{ secrets.EASYEMAIL_CF_PASSWORDS }}
          EASYEMAIL_CF_ADMIN_PASSWORDS: ${{ secrets.EASYEMAIL_CF_ADMIN_PASSWORDS }}
          EASYEMAIL_CF_JWT_SECRET: ${{ secrets.EASYEMAIL_CF_JWT_SECRET }}
          EASYEMAIL_CF_PREFIX: ${{ secrets.EASYEMAIL_CF_PREFIX }}
          EASYEMAIL_CF_DOMAINS: ${{ secrets.EASYEMAIL_CF_DOMAINS }}
          EASYEMAIL_CF_DEFAULT_DOMAINS: ${{ secrets.EASYEMAIL_CF_DEFAULT_DOMAINS }}
          EASYEMAIL_CF_RANDOM_SUBDOMAIN_DOMAINS: ${{ secrets.EASYEMAIL_CF_RANDOM_SUBDOMAIN_DOMAINS }}
          EASYEMAIL_CF_SUBDOMAIN_LABEL_POOL: ${{ secrets.EASYEMAIL_CF_SUBDOMAIN_LABEL_POOL }}
          EASYEMAIL_CF_ENABLE_CREATE_ADDRESS_SUBDOMAIN_MATCH: ${{ secrets.EASYEMAIL_CF_ENABLE_CREATE_ADDRESS_SUBDOMAIN_MATCH }}
          EASYEMAIL_CF_RANDOM_SUBDOMAIN_LENGTH: ${{ secrets.EASYEMAIL_CF_RANDOM_SUBDOMAIN_LENGTH }}
          EASYEMAIL_CF_ENABLE_USER_CREATE_EMAIL: ${{ secrets.EASYEMAIL_CF_ENABLE_USER_CREATE_EMAIL }}
          EASYEMAIL_CF_ENABLE_USER_DELETE_EMAIL: ${{ secrets.EASYEMAIL_CF_ENABLE_USER_DELETE_EMAIL }}
          EASYEMAIL_CF_D1_DATABASE_ID: ${{ secrets.EASYEMAIL_CF_D1_DATABASE_ID }}
          EASYEMAIL_CF_D1_DATABASE_NAME: ${{ secrets.EASYEMAIL_CF_D1_DATABASE_NAME }}
          EASYEMAIL_CF_D1_DATABASE_BINDING: ${{ secrets.EASYEMAIL_CF_D1_DATABASE_BINDING }}
          EASYEMAIL_CF_BOOTSTRAP_ENABLED: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_ENABLED }}
          EASYEMAIL_CF_BOOTSTRAP_CREATE_ZONES: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_CREATE_ZONES }}
          EASYEMAIL_CF_BOOTSTRAP_ACCOUNT_ID: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_ACCOUNT_ID }}
          EASYEMAIL_CF_BOOTSTRAP_ZONES: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_ZONES }}
          EASYEMAIL_CF_D1_LOCATION_HINT: ${{ secrets.EASYEMAIL_CF_D1_LOCATION_HINT }}
          EASYEMAIL_CF_D1_JURISDICTION: ${{ secrets.EASYEMAIL_CF_D1_JURISDICTION }}
          EASYEMAIL_CF_BOOTSTRAP_ZONE_TYPE: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_ZONE_TYPE }}
          EASYEMAIL_CF_BOOTSTRAP_JUMP_START: ${{ secrets.EASYEMAIL_CF_BOOTSTRAP_JUMP_START }}
          EASYEMAIL_CF_SYNC_ROUTING: ${{ secrets.EASYEMAIL_CF_SYNC_ROUTING }}
          EASYEMAIL_CF_ROUTING_MODE: ${{ secrets.EASYEMAIL_CF_ROUTING_MODE }}
          EASYEMAIL_CF_CONTROL_CENTER_DNS_TOKEN: ${{ secrets.EASYEMAIL_CF_CONTROL_CENTER_DNS_TOKEN }}
          EASYEMAIL_CF_AUTH_EMAIL: ${{ secrets.EASYEMAIL_CF_AUTH_EMAIL }}
          EASYEMAIL_CF_GLOBAL_API_KEY: ${{ secrets.EASYEMAIL_CF_GLOBAL_API_KEY }}
          EASYEMAIL_SERVICE_RUNTIME_API_KEY: ${{ secrets.EASYEMAIL_SERVICE_RUNTIME_API_KEY }}
          EASYEMAIL_PROVIDER_CLOUDFLARE_API_KEY: ${{ secrets.EASYEMAIL_PROVIDER_CLOUDFLARE_API_KEY }}
          EASYEMAIL_PROVIDER_MOEMAIL_API_KEY: ${{ secrets.EASYEMAIL_PROVIDER_MOEMAIL_API_KEY }}
          EASYEMAIL_PROVIDER_MOEMAIL_WEB_SESSION_TOKEN: ${{ secrets.EASYEMAIL_PROVIDER_MOEMAIL_WEB_SESSION_TOKEN }}
          EASYEMAIL_PROVIDER_MOEMAIL_WEB_CSRF_TOKEN: ${{ secrets.EASYEMAIL_PROVIDER_MOEMAIL_WEB_CSRF_TOKEN }}
          EASYEMAIL_PROVIDER_IM215_API_KEY: ${{ secrets.EASYEMAIL_PROVIDER_IM215_API_KEY }}
          EASYEMAIL_PROVIDER_MAIL2925_ACCOUNT: ${{ secrets.EASYEMAIL_PROVIDER_MAIL2925_ACCOUNT }}
          EASYEMAIL_PROVIDER_MAIL2925_PASSWORD: ${{ secrets.EASYEMAIL_PROVIDER_MAIL2925_PASSWORD }}
          EASYEMAIL_PROVIDER_GPTMAIL_API_KEY: ${{ secrets.EASYEMAIL_PROVIDER_GPTMAIL_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pyyaml
          python scripts/materialize-action-config.py \
            --base-config config.example.yaml \
            --output config.yaml

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
            push_latest="true"
            run_smoke="true"
            platform="linux/amd64"
            force_publish="false"
          else
            version="${{ inputs.version }}"
            if [[ -z "${version}" ]]; then
              version="release-$(date -u +%Y%m%d)-${GITHUB_RUN_NUMBER}"
            fi
            push_latest="${{ inputs.push_latest }}"
            run_smoke="${{ inputs.run_smoke }}"
            platform="${{ inputs.platform }}"
            force_publish="${{ inputs.force_publish }}"
          fi

          image_ref="${REGISTRY}/${owner}/${IMAGE_NAME}"
          smoke_image="${image_ref}:smoke-${GITHUB_RUN_ID}"

          {
            echo "owner=${owner}"
            echo "version=${version}"
            echo "short_sha=${short_sha}"
            echo "platform=${platform}"
            echo "image_ref=${image_ref}"
            echo "smoke_image=${smoke_image}"
            echo "push_latest=${push_latest}"
            echo "run_smoke=${run_smoke}"
            echo "force_publish=${force_publish}"
            echo "tags<<EOF"
            echo "${image_ref}:${version}"
            echo "${image_ref}:sha-${short_sha}"
            if [[ "${push_latest}" == "true" ]]; then
              echo "${image_ref}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate Release Tag
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate-release-tag.py \
            --mode service-base \
            --tag "${{ steps.release_meta.outputs.version }}"

      - name: Detect Relevant Changes
        id: change_gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.release_meta.outputs.force_publish }}" == "true" ]]; then
            {
              echo "should_publish=true"
              echo "reason=force_publish"
              echo "matched_files<<EOF"
              echo "(forced)"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t matched_files < <(
            git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" -- \
              service/base \
              deploy/service/base \
              config.example.yaml \
              scripts/compile-service-base-image.ps1 \
              scripts/deploy-service-base.ps1 \
              scripts/deploy-easyemail-release.ps1 \
              scripts/materialize-action-config.py \
              scripts/render-derived-configs.py \
              scripts/render-derived-configs.ps1 \
              scripts/upload-service-base-r2-config.ps1 \
              scripts/upload-service-base-r2-config.py \
              scripts/write-service-base-r2-bootstrap.ps1 \
              deploy/service/base/bootstrap-service-config.py \
              .github/workflows/publish-service-base-ghcr.yml
          )

          if [[ "${#matched_files[@]}" -eq 0 ]]; then
            {
              echo "should_publish=false"
              echo "reason=no_relevant_changes"
              echo "matched_files<<EOF"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "should_publish=true"
            echo "reason=relevant_changes_detected"
            echo "matched_files<<EOF"
            printf '%s\n' "${matched_files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Skip Publish Summary
        if: steps.change_gate.outputs.should_publish != 'true'
        shell: bash
        run: |
          {
            echo "## Service Base GHCR Publish"
            echo
            echo "- Result: skipped"
            echo "- Reason: \`${{ steps.change_gate.outputs.reason }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set Up Docker Buildx
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Smoke Image
        if: steps.change_gate.outputs.should_publish == 'true' && steps.release_meta.outputs.run_smoke == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f deploy/service/base/Dockerfile \
            -t "${{ steps.release_meta.outputs.smoke_image }}" \
            .

      - name: Run Service Base Smoke Check
        if: steps.change_gate.outputs.should_publish == 'true' && steps.release_meta.outputs.run_smoke == 'true'
        shell: pwsh
        run: >
          .\deploy\service\base\smoke-easy-email-docker-api.ps1
          -ConfigPath .\config.yaml
          -Image "${{ steps.release_meta.outputs.smoke_image }}"

      - name: Resolve Smoke Label
        if: steps.change_gate.outputs.should_publish == 'true'
        id: smoke_label
        shell: bash
        run: |
          if [[ "${{ steps.release_meta.outputs.run_smoke }}" == "true" ]]; then
            echo "value=passed" >> "${GITHUB_OUTPUT}"
          else
            echo "value=skipped" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log In To GHCR
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.EASYEMAIL_PUBLISH_GHCR_USERNAME != '' && secrets.EASYEMAIL_PUBLISH_GHCR_USERNAME || github.actor }}
          password: ${{ secrets.EASYEMAIL_PUBLISH_GHCR_TOKEN != '' && secrets.EASYEMAIL_PUBLISH_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build And Push Service Base Image
        if: steps.change_gate.outputs.should_publish == 'true'
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/service/base/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          platforms: ${{ steps.release_meta.outputs.platform }}
          tags: ${{ steps.release_meta.outputs.tags }}
          cache-from: type=gha,scope=service-base-ghcr
          cache-to: type=gha,mode=max,scope=service-base-ghcr

      - name: Upload Service Base Runtime Config To R2
        if: steps.change_gate.outputs.should_publish == 'true'
        id: runtime_config_upload
        env:
          EASYEMAIL_R2_CONFIG_ACCOUNT_ID: ${{ secrets.EASYEMAIL_R2_CONFIG_ACCOUNT_ID }}
          EASYEMAIL_R2_CONFIG_BUCKET: ${{ secrets.EASYEMAIL_R2_CONFIG_BUCKET }}
          EASYEMAIL_R2_CONFIG_ENDPOINT: ${{ secrets.EASYEMAIL_R2_CONFIG_ENDPOINT }}
          EASYEMAIL_R2_CONFIG_CONFIG_OBJECT_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_CONFIG_OBJECT_KEY }}
          EASYEMAIL_R2_CONFIG_ENV_OBJECT_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_ENV_OBJECT_KEY }}
          EASYEMAIL_R2_CONFIG_USERSCRIPT_OBJECT_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_USERSCRIPT_OBJECT_KEY }}
          EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY }}
          EASYEMAIL_R2_CONFIG_UPLOAD_ACCESS_KEY_ID: ${{ secrets.EASYEMAIL_R2_CONFIG_UPLOAD_ACCESS_KEY_ID }}
          EASYEMAIL_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY }}
        shell: pwsh
        run: |
          foreach ($name in @(
            'EASYEMAIL_R2_CONFIG_ACCOUNT_ID',
            'EASYEMAIL_R2_CONFIG_BUCKET',
            'EASYEMAIL_R2_CONFIG_CONFIG_OBJECT_KEY',
            'EASYEMAIL_R2_CONFIG_ENV_OBJECT_KEY',
            'EASYEMAIL_R2_CONFIG_USERSCRIPT_OBJECT_KEY',
            'EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY',
            'EASYEMAIL_R2_CONFIG_UPLOAD_ACCESS_KEY_ID',
            'EASYEMAIL_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY'
          )) {
            if ([string]::IsNullOrWhiteSpace([string](Get-Item "Env:$name").Value)) {
              throw "Missing required R2 config secret: $name"
            }
          }

          $manifestPath = Join-Path $PWD 'service-base-r2-config-manifest.json'
          .\scripts\upload-service-base-r2-config.ps1 `
            -ConfigPath .\config.yaml `
            -AccountId $env:EASYEMAIL_R2_CONFIG_ACCOUNT_ID `
            -Bucket $env:EASYEMAIL_R2_CONFIG_BUCKET `
            -AccessKeyId $env:EASYEMAIL_R2_CONFIG_UPLOAD_ACCESS_KEY_ID `
            -SecretAccessKey $env:EASYEMAIL_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY `
            -ConfigObjectKey $env:EASYEMAIL_R2_CONFIG_CONFIG_OBJECT_KEY `
            -RuntimeEnvObjectKey $env:EASYEMAIL_R2_CONFIG_ENV_OBJECT_KEY `
            -UserscriptSettingsObjectKey $env:EASYEMAIL_R2_CONFIG_USERSCRIPT_OBJECT_KEY `
            -ManifestObjectKey $env:EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY `
            -Endpoint $env:EASYEMAIL_R2_CONFIG_ENDPOINT `
            -ReleaseVersion '${{ steps.release_meta.outputs.version }}' `
            -ManifestOutput $manifestPath

          "path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Generate Encrypted Owner Import Code
        if: steps.change_gate.outputs.should_publish == 'true'
        id: import_code
        env:
          EASYEMAIL_R2_CONFIG_ACCOUNT_ID: ${{ secrets.EASYEMAIL_R2_CONFIG_ACCOUNT_ID }}
          EASYEMAIL_R2_CONFIG_BUCKET: ${{ secrets.EASYEMAIL_R2_CONFIG_BUCKET }}
          EASYEMAIL_R2_CONFIG_ENDPOINT: ${{ secrets.EASYEMAIL_R2_CONFIG_ENDPOINT }}
          EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY }}
          EASYEMAIL_R2_CONFIG_READ_ACCESS_KEY_ID: ${{ secrets.EASYEMAIL_R2_CONFIG_READ_ACCESS_KEY_ID }}
          EASYEMAIL_R2_CONFIG_READ_SECRET_ACCESS_KEY: ${{ secrets.EASYEMAIL_R2_CONFIG_READ_SECRET_ACCESS_KEY }}
          EASYEMAIL_IMPORT_CODE_OWNER_PUBLIC_KEY: ${{ secrets.EASYEMAIL_IMPORT_CODE_OWNER_PUBLIC_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            EASYEMAIL_R2_CONFIG_ACCOUNT_ID \
            EASYEMAIL_R2_CONFIG_BUCKET \
            EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY \
            EASYEMAIL_R2_CONFIG_READ_ACCESS_KEY_ID \
            EASYEMAIL_R2_CONFIG_READ_SECRET_ACCESS_KEY \
            EASYEMAIL_IMPORT_CODE_OWNER_PUBLIC_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required import-code secret: ${name}" >&2
              exit 1
            fi
          done

          python -m pip install --disable-pip-version-check pynacl

          python scripts/easyemail-import-code.py encode \
            --account-id "${EASYEMAIL_R2_CONFIG_ACCOUNT_ID}" \
            --bucket "${EASYEMAIL_R2_CONFIG_BUCKET}" \
            --manifest-object-key "${EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY}" \
            --access-key-id "${EASYEMAIL_R2_CONFIG_READ_ACCESS_KEY_ID}" \
            --secret-access-key "${EASYEMAIL_R2_CONFIG_READ_SECRET_ACCESS_KEY}" \
            --endpoint "${EASYEMAIL_R2_CONFIG_ENDPOINT}" \
            --sync-enabled \
            --sync-interval-seconds 7200 \
            --release-version "${{ steps.release_meta.outputs.version }}" \
            --json-output \
            --output service-base-import-code.bundle.json

          python scripts/easyemail-import-code.py encrypt \
            --bundle-file service-base-import-code.bundle.json \
            --public-key "${EASYEMAIL_IMPORT_CODE_OWNER_PUBLIC_KEY}" \
            --metadata-json "{\"releaseVersion\":\"${{ steps.release_meta.outputs.version }}\",\"imageRef\":\"${{ steps.release_meta.outputs.image_ref }}\",\"manifestObjectKey\":\"${EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY}\"}" \
            --output service-base-import-code.encrypted.json

          echo "bundle_path=service-base-import-code.bundle.json" >> "${GITHUB_OUTPUT}"
          echo "encrypted_path=service-base-import-code.encrypted.json" >> "${GITHUB_OUTPUT}"

      - name: Write Release Manifest
        if: steps.change_gate.outputs.should_publish == 'true'
        id: manifest
        shell: pwsh
        run: |
          . .\scripts\lib\easyemail-config.ps1

          $version = '${{ steps.release_meta.outputs.version }}'
          $tags = @(
            "${{ steps.release_meta.outputs.image_ref }}:${{ steps.release_meta.outputs.version }}"
            "${{ steps.release_meta.outputs.image_ref }}:sha-${{ steps.release_meta.outputs.short_sha }}"
          )
          if ('${{ steps.release_meta.outputs.push_latest }}' -eq 'true') {
            $tags += "${{ steps.release_meta.outputs.image_ref }}:latest"
          }

          $distribution = $null
          if (Test-Path -LiteralPath '${{ steps.runtime_config_upload.outputs.path }}') {
            $distribution = Get-Content -LiteralPath '${{ steps.runtime_config_upload.outputs.path }}' -Raw | ConvertFrom-Json
          }

          $matchedFilesRaw = @'
          ${{ steps.change_gate.outputs.matched_files }}
          '@
          $matchedFiles = @(
            $matchedFilesRaw -split "`r?`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          )
          if ($matchedFiles.Count -eq 0) {
            $matchedFiles = @('(no matched files recorded)')
          }

          $scopeSummary = Get-EasyEmailReleaseScopeSummary -Files $matchedFiles
          $channel = Get-EasyEmailReleaseChannel -Tag $version
          $tagMarkdown = ($tags | ForEach-Object { '- `{0}`' -f $_ }) -join [Environment]::NewLine
          $matchedFilesMarkdown = ($matchedFiles | ForEach-Object { '- `{0}`' -f $_ }) -join [Environment]::NewLine

          $manifest = [ordered]@{
            schemaVersion = 1
            generatedAtUtc = [DateTime]::UtcNow.ToString('o')
            repository = '${{ github.repository }}'
            workflow = [ordered]@{
              name = '${{ github.workflow }}'
              runId = '${{ github.run_id }}'
              runNumber = '${{ github.run_number }}'
              runAttempt = '${{ github.run_attempt }}'
              url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            }
            source = [ordered]@{
              eventName = '${{ github.event_name }}'
              actor = '${{ github.actor }}'
              ref = '${{ github.ref }}'
              sha = '${{ github.sha }}'
              shortSha = '${{ steps.release_meta.outputs.short_sha }}'
              changeReason = '${{ steps.change_gate.outputs.reason }}'
              matchedFiles = $matchedFiles
            }
            audit = [ordered]@{
              scopeSummary = $scopeSummary.summary
              scopeGroups = $scopeSummary.groups
            }
            release = [ordered]@{
              kind = 'service-base-ghcr'
              version = $version
              channel = $channel
              imageRef = '${{ steps.release_meta.outputs.image_ref }}'
              platform = '${{ steps.release_meta.outputs.platform }}'
              digest = '${{ steps.build_push.outputs.digest }}'
              tags = $tags
              publishLatest = ('${{ steps.release_meta.outputs.push_latest }}' -eq 'true')
            }
            distribution = $distribution
            validation = [ordered]@{
              smoke = '${{ steps.smoke_label.outputs.value }}'
              sbom = 'enabled'
              provenance = 'mode=max'
            }
            markdown = [ordered]@{
              tags = $tagMarkdown
              matchedFiles = $matchedFilesMarkdown
              scopeSummary = $scopeSummary.markdown
            }
          }

          $manifestPath = Join-Path $PWD 'service-base-release-manifest.json'
          $manifest | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $manifestPath -Encoding UTF8
          "path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Render Release Notes
        if: steps.change_gate.outputs.should_publish == 'true'
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render-release-template.py \
            --template .github/release-notes/service-base-ghcr.md.tmpl \
            --context "${{ steps.manifest.outputs.path }}" \
            --output service-base-release-notes.md
          echo "path=service-base-release-notes.md" >> "${GITHUB_OUTPUT}"

      - name: Upload Release Manifest
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: service-base-release-manifest
          path: ${{ steps.manifest.outputs.path }}

      - name: Upload Runtime Config Distribution Manifest
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: service-base-r2-config-manifest
          path: ${{ steps.runtime_config_upload.outputs.path }}

      - name: Upload Encrypted Import Code
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: service-base-import-code-encrypted
          path: ${{ steps.import_code.outputs.encrypted_path }}

      - name: Upload Release Notes Artifact
        if: steps.change_gate.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: service-base-release-notes
          path: ${{ steps.release_notes.outputs.path }}

      - name: Create Or Update GitHub Release
        if: steps.change_gate.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release_meta.outputs.version }}"
          existing_body="existing-release-body.md"
          merged_body="merged-release-body.md"

          if gh release view "${tag}" --json body --jq .body > "${existing_body}" 2>/dev/null; then
            release_exists="true"
          else
            release_exists="false"
            : > "${existing_body}"
          fi

          python scripts/upsert-release-notes-section.py \
            --section-id service-base-ghcr \
            --section-file "${{ steps.release_notes.outputs.path }}" \
            --existing "${existing_body}" \
            --output "${merged_body}"

          if [[ "${release_exists}" == "true" ]]; then
            gh release edit "${tag}" \
              --title "${tag}" \
              --notes-file "${merged_body}"
          else
            gh release create "${tag}" \
              --target "${GITHUB_SHA}" \
              --title "${tag}" \
              --notes-file "${merged_body}"
          fi

          gh release upload "${tag}" \
            "${{ steps.manifest.outputs.path }}" \
            "${{ steps.release_notes.outputs.path }}" \
            --clobber

      - name: Write Release Summary
        if: steps.change_gate.outputs.should_publish == 'true'
        shell: bash
        run: |
          cat "${{ steps.release_notes.outputs.path }}" >> "${GITHUB_STEP_SUMMARY}"
          {
            echo
            echo "## Encrypted Import Code"
            echo
            echo "- Artifact: \`service-base-import-code-encrypted\`"
            echo "- Manifest key: \`${{ secrets.EASYEMAIL_R2_CONFIG_MANIFEST_OBJECT_KEY }}\`"
            echo "- Decrypt locally with: \`python scripts/easyemail-import-code.py decrypt --encrypted-file <downloaded-json> --private-key-file <owner-private-key.txt> --import-code-only\`"
          } >> "${GITHUB_STEP_SUMMARY}"
