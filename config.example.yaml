# EasyEmail operator config
#
# Copy this file to `config.yaml` and fill in the values you actually use.
# The operator scripts read only the root `config.yaml`; they generate any
# temporary deploy files they need at runtime.

userscript:
  sourcePath: runtimes/userscript/easy_email_proxy.user.js
  outputPath: runtimes/userscript/easy_email_proxy.local.user.js
  copyToClipboard: false
  secrets:
    cloudflare_customAuth: ""
    cloudflare_adminAuth: ""
    moemail_apiKey: ""
    gptmail_apiKey: ""
    im215_apiKey: ""
    mail2925_account: ""
    mail2925_jwtToken: ""
    mail2925_deviceUid: ""
    mail2925_cookieHeader: ""

serviceBase:
  context: .
  dockerfile: deploy/service/base/Dockerfile
  image: easyemail/easy-email-service:local
  containerEnvironment:
    EASY_PROXY_BASE_URL: http://host.docker.internal:29888
    EASY_PROXY_API_KEY: ""
    EASY_PROXY_RUNTIME_HOST: host.docker.internal
    EASY_PROXY_HOST_ID: easyemail-service-base
    M2U_UPSTREAM_PROXY_URL: http://host.docker.internal:22323
    M2U_USE_EASY_PROXY_ON_CAPACITY: "true"
    M2U_EASY_PROXY_REQUIRE_DEDICATED_NODE: "false"
    M2U_EASY_PROXY_MAX_ATTEMPTS: "10"
  runtime:
    server:
      apiKey: ""
    providers:
      cloudflareTempEmail:
        baseUrl: https://mail.example.com
        apiKey: ""
        adminAuth: ""
        domain: mail.example.com
        domains:
          - mail.example.com
        randomSubdomainDomains:
          - mail.example.com
      moemail:
        baseUrl: https://sall.cc
        apiKey: ""
        domain: sall.cc
        expiryTimeMs: 3600000
        webSessionToken: ""
        webCsrfToken: ""
        webCallbackUrl: "https%3A%2F%2Fsall.cc"
        webReferer: "https://sall.cc/zh-CN/moe"
      im215:
        apiKey: ""
        autoDomainStrategy: balanced
        timeoutSeconds: 30
      mail2925:
        baseUrl: https://mail.2925.com
        account: ""
        password: ""
        domain: 2925.com
        folderName: Inbox
        aliasSeparator: _
        aliasSuffixLength: 10
        timeoutSeconds: 60
      gptmail:
        baseUrl: https://mail.chatgpt.org.uk
        # Shared public free key. It refreshes daily on the upstream side.
        freeApiKey: gpt-test
        freeKeysText: ""
        # Private keys/pools. These are exhausted permanently once spent.
        paidApiKey: ""
        paidKeysText: ""
      tempmailLol:
        baseUrl: https://api.tempmail.lol/v2
      m2u:
        baseUrl: https://api.m2u.io
        preferredDomain: edu.kg
        useEasyProxyOnCapacity: true
        easyProxyRequireDedicatedNode: true
        easyProxyMaxAttempts: 10

cloudflareMail:
  publicBaseUrl: https://mail.example.com
  publicDomain: mail.example.com
  publicZone: example.com
  projectRoot: upstreams/cloudflare_temp_email
  workerDir: worker
  frontendDir: frontend
  workerName: cloudflare_temp_email
  workerEnv: production
  buildFrontend: true
  deployWorker: true
  syncRouting: false
  bootstrap:
    enabled: false
    createZones: true
    accountId: ""
    zones:
      - example.com
    d1LocationHint: ""
    d1Jurisdiction: ""
    zoneType: full
    jumpStart: false
  sending:
    # Optional: Cloudflare Email Service sender domains for EasyEmail-opened
    # cloudflare_temp_email mailboxes. Bootstrap/deploy will ensure these
    # subdomains exist under their matching Cloudflare zones.
    domains:
      - tx-mail.example.com
    preferredSenderDomain: tx-mail.example.com
    preferredSenderLocalPart: matrixsender
  worker:
    send_email:
      - name: SEND_MAIL
        remote: true
    vars:
      PASSWORDS:
        - change-me
      ADMIN_PASSWORDS:
        - admin-change-me
      JWT_SECRET: change-me
      # Optional: configure an outbound sender that does not require
      # Cloudflare verified-recipient flow for every target mailbox.
      RESEND_TOKEN: ""
      # Optional: restrict SEND_MAIL binding usage to these managed domains.
      SEND_MAIL_DOMAINS:
        - mail.example.com
      # Optional: YAML object keyed by sender domain. Example:
      # SMTP_CONFIG:
      #   mail.example.com:
      #     host: smtp.example.com
      #     port: 587
      #     secure: false
      #     auth:
      #       user: smtp-user
      #       pass: smtp-password
      SMTP_CONFIG: {}
    d1_databases:
      - binding: DB
        database_name: cloudflare-temp-email
        database_id: "00000000-0000-0000-0000-000000000000"
  routing:
    mode: wildcard
    stateSyncPolicy: bootstrap-or-forced
    plan:
      subdomainLabelPool:
        - alpha
        - beta
        - gamma
      domains:
        - mail.example.com
        - example.com
        - "*.example.com"
    controlCenterDnsToken: ""
    cloudflareGlobalAuth:
      authEmail: ""
      globalApiKey: ""

publishing:
  ghcr:
    registry: ghcr.io
    owner: ""
    username: ""
    token: ""
  controlCenter:
    baseUrl: https://control.example.com
    releaseCatalogPublishPath: /admin/release-set-catalog
    releaseCatalogPayloadPath: ""
    accessClientId: ""
    accessClientSecret: ""
    releasePublishToken: ""
