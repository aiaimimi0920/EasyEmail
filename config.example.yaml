# EasyEmail operator config
#
# Copy this file to `config.yaml` and fill in the values you actually use.
# The operator scripts read only the root `config.yaml`; they generate any
# temporary deploy files they need at runtime.

userscript:
  sourcePath: runtimes/userscript/easy_email_proxy.user.js
  outputPath: runtimes/userscript/easy_email_proxy.local.user.js
  copyToClipboard: false
  secrets:
    cloudflare_customAuth: ""
    cloudflare_adminAuth: ""
    moemail_apiKey: ""
    gptmail_apiKey: ""
    im215_apiKey: ""

serviceBase:
  context: .
  dockerfile: deploy/service/base/Dockerfile
  image: easyemail/easy-email-service:local
  containerEnvironment:
    EASY_PROXY_BASE_URL: http://easy-proxy-service:9888
    EASY_PROXY_API_KEY: ""
    EASY_PROXY_RUNTIME_HOST: easy-proxy-service
    EASY_PROXY_HOST_ID: easyemail-service-base
    M2U_USE_EASY_PROXY_ON_CAPACITY: "true"
    M2U_EASY_PROXY_REQUIRE_DEDICATED_NODE: "true"
    M2U_EASY_PROXY_MAX_ATTEMPTS: "10"
  runtime:
    server:
      apiKey: ""
    providers:
      cloudflareTempEmail:
        baseUrl: https://mail.example.com
        apiKey: ""
        domain: mail.example.com
        domains:
          - mail.example.com
        randomSubdomainDomains:
          - mail.example.com

cloudflareMail:
  publicBaseUrl: https://mail.example.com
  publicDomain: mail.example.com
  projectRoot: upstreams/cloudflare_temp_email
  workerDir: worker
  frontendDir: frontend
  workerName: cloudflare_temp_email
  workerEnv: production
  buildFrontend: true
  deployWorker: true
  syncRouting: false
  worker:
    vars:
      PASSWORDS:
        - change-me
      JWT_SECRET: change-me
    d1_databases:
      - binding: DB
        database_name: cloudflare-temp-email
        database_id: "00000000-0000-0000-0000-000000000000"
  routing:
    mode: exact
    plan:
      subdomainLabelPool:
        - alpha
        - beta
        - gamma
      domains:
        - mail.example.com
        - example.com
        - "*.example.com"
    controlCenterDnsToken: ""
    cloudflareGlobalAuth:
      authEmail: ""
      globalApiKey: ""
